<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admissions - Excillence College</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{

      background:
      linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
      url("https://images.unsplash.com/photo-1562774053-701939374585");

      background-size:cover;
      background-position:center;
      background-attachment:fixed;
    }

    nav{
      background:rgba(0,0,0,0.5);
      padding:20px 60px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    nav h1{
      color:#ffd700;
      font-size:40px;
    }

    nav ul{
      display:flex;
      list-style:none;
      gap:30px;
    }

    nav ul li a{
      color:white;
      text-decoration:none;
      font-size:20px;
    }

    nav ul li a:hover{
      color:#ffd700;
    }

    .container{
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:85vh;
      padding:40px;
    }

    .form-box{
      width:450px;
      background:rgba(255,255,255,0.95);
      padding:40px;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    .form-box h2{
      text-align:center;
      margin-bottom:30px;
      color:#0b1d3a;
      font-size:45px;
    }

    input,
    select{
      width:100%;
      padding:14px;
      margin-bottom:20px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      background:#ffd700;
      font-size:20px;
      border-radius:8px;
      cursor:pointer;
    }

    button:hover{
      background:#0b1d3a;
      color:white;
    }

  </style>
</head>
<body>

  <nav>

    <h1>Excillence College</h1>

    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="course.html">Courses</a></li>
      <li><a href="admission.html">Admissions</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>

  </nav>

  <div class="container">

    <div class="form-box">

      <h2>Admission Form</h2>

      <form id="admissionForm">

        <input type="text" placeholder="Full Name" required>

        <input type="email" placeholder="Email Address" required>

        <input type="number" placeholder="Phone Number" required>

        <select required>

          <option>Select Course</option>
          <option>BSc IT</option>
          <option>BCA</option>
          <option>MSc IT</option>

        </select>

        <button type="submit">
          Submit Application
        </button>

      </form>

    </div>

  </div>

  <script>

    document.getElementById("admissionForm")
    .addEventListener("submit", function(e){

      e.preventDefault();

      alert("Admission Form Submitted Successfully!");

    });

  </script>

</body>
</html>
